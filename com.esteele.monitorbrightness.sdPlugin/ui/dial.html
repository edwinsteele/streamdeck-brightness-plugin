<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Display">
			<sdpi-select setting="displayName" placeholder="Select a monitor">
				<option value="P27u-20">P27u-20</option>
				<option value="Studio Display">Studio Display</option>
				<option value="Built-in">Built-in</option>
			</sdpi-select>
		</sdpi-item>
		<sdpi-item label="Note">
			<span>Rotate to adjust in 10% steps. Press to blackout (0%); press again to restore the previous brightness.</span>
		</sdpi-item>
	</body>
</html>
